global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'sflow-rt-metrics'
    metrics_path: /prometheus/metrics/ALL/ALL/txt
    static_configs:
      - targets: ['10.255.9.2:8008']

  - job_name: 'sflow-rt-analyzer'
    metrics_path: /prometheus/analyzer/txt
    static_configs:
      - targets: ['10.255.9.2:8008']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
