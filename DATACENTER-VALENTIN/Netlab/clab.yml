name: life
prefix: "clab"

mgmt:
  network: netlab_mgmt
  ipv4-subnet: 192.168.121.0/24
  # Note: 'start' not validated
topology:
  nodes:
    spine1:
      mgmt-ipv4: 192.168.121.101
      kind: ceos
      env: {'INTFTYPE': 'et', 'CLAB_MGMT_VRF': 'management'}
      image: ceos:4.36.1F
      runtime: docker
      group: spines
    spine2:
      mgmt-ipv4: 192.168.121.102
      kind: ceos
      env: {'INTFTYPE': 'et', 'CLAB_MGMT_VRF': 'management'}
      image: ceos:4.36.1F
      runtime: docker
      group: spines
    leaf1:
      mgmt-ipv4: 192.168.121.103
      kind: ceos
      env: {'INTFTYPE': 'et', 'CLAB_MGMT_VRF': 'management'}
      image: ceos:4.36.1F
      runtime: docker
      group: leafs
    leaf2:
      mgmt-ipv4: 192.168.121.104
      kind: ceos
      env: {'INTFTYPE': 'et', 'CLAB_MGMT_VRF': 'management'}
      image: ceos:4.36.1F
      runtime: docker
      group: leafs
    leaf3:
      mgmt-ipv4: 192.168.121.105
      kind: ceos
      env: {'INTFTYPE': 'et', 'CLAB_MGMT_VRF': 'management'}
      image: ceos:4.36.1F
      runtime: docker
      group: leafs
    bleaf:
      mgmt-ipv4: 192.168.121.106
      kind: ceos
      env: {'INTFTYPE': 'et', 'CLAB_MGMT_VRF': 'management'}
      image: ceos:4.36.1F
      runtime: docker
      group: leafs
    grafana:
      mgmt-ipv4: 192.168.121.107
      kind: linux
      restart-policy: 'no'
      ports: ['0.0.0.0:3000:3000']
      image: grafana/grafana:12.2.9
      runtime: docker
      group: monitoring,netlab_no_reload,netlab_no_collect
      binds:
      - node_files/-shared-hosts:/etc/hosts:ro
    prometheus:
      mgmt-ipv4: 192.168.121.108
      kind: linux
      restart-policy: 'no'
      ports: ['0.0.0.0:9090:9090']
      image: prometheus-sae:latest
      runtime: docker
      group: monitoring,netlab_no_reload,netlab_no_collect
      binds:
      - node_files/-shared-hosts:/etc/hosts:ro
    sflowrt:
      mgmt-ipv4: 192.168.121.109
      kind: linux
      restart-policy: 'no'
      ports: ['0.0.0.0:8008:8008']
      image: sflowrt-sae:latest
      runtime: docker
      group: monitoring,netlab_no_reload,netlab_no_collect
      binds:
      - node_files/-shared-hosts:/etc/hosts:ro
    nginx1:
      mgmt-ipv4: 192.168.121.110
      kind: linux
      restart-policy: 'no'
      ports: ['80:80']
      image: nginx:latest
      runtime: docker
      group: netlab_no_reload,netlab_no_collect
      binds:
      - node_files/-shared-hosts:/etc/hosts:ro
    nginx2:
      mgmt-ipv4: 192.168.121.111
      kind: linux
      restart-policy: 'no'
      ports: ['81:81']
      image: nginx:latest
      runtime: docker
      group: netlab_no_reload,netlab_no_collect
      binds:
      - node_files/-shared-hosts:/etc/hosts:ro
    librespeed:
      mgmt-ipv4: 192.168.121.112
      kind: linux
      restart-policy: 'no'
      ports: ['0.0.0.0:8080:8080']
      image: linuxserver/librespeed
      runtime: docker
      group: netlab_no_reload,netlab_no_collect
      binds:
      - node_files/-shared-hosts:/etc/hosts:ro
    remotedesktop:
      mgmt-ipv4: 192.168.121.113
      kind: linux
      restart-policy: 'no'
      ports: ['3389:3389']
      image: linuxserver/webtop:ubuntu-kde-version-f0194e9c
      runtime: docker
      group: netlab_no_reload,netlab_no_collect
      binds:
      - node_files/-shared-hosts:/etc/hosts:ro
    networkutils:
      mgmt-ipv4: 192.168.121.114
      kind: linux
      restart-policy: 'no'
      image: amouat/network-utils
      runtime: docker
      group: netlab_no_reload,netlab_no_collect
      binds:
      - node_files/-shared-hosts:/etc/hosts:ro


  links:
  - endpoints:
    - "spine1:et1"
    - "leaf1:et1"
  - endpoints:
    - "spine1:et2"
    - "leaf2:et1"
  - endpoints:
    - "spine1:et3"
    - "leaf3:et1"
  - endpoints:
    - "spine1:et4"
    - "bleaf:et1"
  - endpoints:
    - "spine2:et1"
    - "leaf1:et2"
  - endpoints:
    - "spine2:et2"
    - "leaf2:et2"
  - endpoints:
    - "spine2:et3"
    - "leaf3:et2"
  - endpoints:
    - "spine2:et4"
    - "bleaf:et2"
  - endpoints:
    - "spine1:et5"
    - "sflowrt:eth1"
  - endpoints:
    - "spine1:et6"
    - "grafana:eth1"
  - endpoints:
    - "spine1:et7"
    - "prometheus:eth1"
  - endpoints:
    - "spine1:et8"
    - "spine2:et5"
  - endpoints:
    - "leaf1:et3"
    - "nginx1:eth1"
  - endpoints:
    - "leaf1:et4"
    - "nginx2:eth1"
  - endpoints:
    - "leaf2:et3"
    - "librespeed:eth1"
  - endpoints:
    - "leaf2:et4"
    - "remotedesktop:eth1"
  - endpoints:
    - "bleaf:et3"
    - "macvlan:ens18"
  - endpoints:
    - "leaf3:et3"
    - "networkutils:eth1"
