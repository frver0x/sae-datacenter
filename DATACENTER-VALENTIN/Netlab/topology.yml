links:
  - spine1:
      ipv4: 10.255.1.1/30
    leaf1:
      ipv4: 10.255.1.2/30
  - spine1:
      ipv4: 10.255.1.5/30
    leaf2:
      ipv4: 10.255.1.6/30
  - spine1:
      ipv4: 10.255.1.9/30
    leaf3:
      ipv4: 10.255.1.10/30
  - spine1:
      ipv4: 10.255.1.13/30
    bleaf:
      ipv4: 10.255.1.14/30
  - spine2:
      ipv4: 10.255.2.1/30
    leaf1:
      ipv4: 10.255.2.2/30
  - spine2:
      ipv4: 10.255.2.5/30
    leaf2:
      ipv4: 10.255.2.6/30
  - spine2:
      ipv4: 10.255.2.9/30
    leaf3:
      ipv4: 10.255.2.10/30
  - spine2:
      ipv4: 10.255.2.13/30
    bleaf:
      ipv4: 10.255.2.14/30
  - spine1:
      ipv4: 10.255.9.1/30
    sflowrt:
      ipv4: 10.255.9.2/30
  - spine1:
      ipv4: 10.255.10.1/30
    grafana:
      ipv4: 10.255.10.2/30
  - spine1:
      ipv4: 10.255.11.1/30
    prometheus:
      ipv4: 10.255.11.2/30
  - spine1:
      ipv4: 10.255.3.1/30
    spine2:
      ipv4: 10.255.3.2/30
  - leaf1:
      vlan.access: web
    nginx1:
      ipv4: 172.16.1.1/24
  - leaf1:
      vlan.access: web
    nginx2: 
      ipv4: 172.16.1.2/24
  - leaf2:
      vlan.access: web
    librespeed:
      ipv4: 172.16.1.3/24
  - leaf2:
      vlan.access: web
    remotedesktop:
      ipv4: 172.16.1.4/24
