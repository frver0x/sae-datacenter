provider: clab
defaults.device: eos
defaults.devices.eos.clab.image: ceos:4.36.1F
defaults.devices.eos.mgmt.ipv4: True

module: [ routing, vlan ]
plugin: [ files ]

vlans:
  web:
    id: 560
    mode: bridge
  machines:
    id: 570
    mode: bridge

groups:
  spines:
    members: [ spine1, spine2 ]
    device: eos
  leafs:
    members: [ leaf1, leaf2, leaf3, bleaf ]
    device: eos
  monitoring:
    members: [ grafana, prometheus, sflowrt ]
    device: linux
    module: [ routing ]
    routing.static:
      - ipv4: 0.0.0.0/0
        nexthop.node: spine1

nodes:
  spine1:
    loopback:
      ipv4: 10.255.0.1/32
    config.inline: |
      enable
      conf t

      interface Loopback0
        ip address 10.255.0.1/32
        
      router bgp 65899
        neighbor 10.0.0.1 remote-as 65899
        neighbor 10.0.0.1 update-source Loopback0
        neighbor 10.0.0.1 description leaf1-evpn
        neighbor 10.0.0.1 route-reflector-client
        neighbor 10.0.0.1 send-community extended
        neighbor 10.0.0.2 remote-as 65899
        neighbor 10.0.0.2 update-source Loopback0
        neighbor 10.0.0.2 description leaf2-evpn
        neighbor 10.0.0.2 route-reflector-client
        neighbor 10.0.0.2 send-community extended
        neighbor 10.0.0.3 remote-as 65899
        neighbor 10.0.0.3 update-source Loopback0
        neighbor 10.0.0.3 description leaf3-evpn
        neighbor 10.0.0.3 route-reflector-client
        neighbor 10.0.0.3 send-community extended
        neighbor 10.0.0.4 remote-as 65899
        neighbor 10.0.0.4 update-source Loopback0
        neighbor 10.0.0.4 description leaf4-evpn
        neighbor 10.0.0.4 route-reflector-client
        neighbor 10.0.0.4 send-community extended
        neighbor 10.255.1.2 remote-as 65899
        neighbor 10.255.1.2 description underlay spine1 -> leaf1
        neighbor 10.255.1.2 route-reflector-client
        neighbor 10.255.1.6 remote-as 65899
        neighbor 10.255.1.6 description underlay spine1 -> leaf2
        neighbor 10.255.1.6 route-reflector-client
        neighbor 10.255.1.10 remote-as 65899
        neighbor 10.255.1.10 description underlay spine1 -> leaf3
        neighbor 10.255.1.10 route-reflector-client
        neighbor 10.255.1.14 remote-as 65899
        neighbor 10.255.1.14 description underlay spine1 -> leaf4
        neighbor 10.255.1.14 route-reflector-client
        neighbor 10.255.3.2 remote-as 65899
        neighbor 10.255.3.2 description peering spine1 -> spine2
        !
        address-family evpn
            neighbor 10.0.0.1 activate
            neighbor 10.0.0.2 activate
            neighbor 10.0.0.3 activate
            neighbor 10.0.0.4 activate
        !
        address-family ipv4
            neighbor 10.255.1.2 activate
            neighbor 10.255.1.2 next-hop-self
            neighbor 10.255.1.6 activate
            neighbor 10.255.1.6 next-hop-self
            neighbor 10.255.1.10 activate
            neighbor 10.255.1.10 next-hop-self
            neighbor 10.255.1.14 activate
            neighbor 10.255.1.14 next-hop-self
            ! Routage de la Loopback
            network 10.255.0.1/32 
            ! Lien spine1 <-> sflowrt
            network 10.255.9.0/30 
            ! Lien spine1 <-> grafana
            network 10.255.10.0/30 
            ! Lien spine1 <-> prometheus
            network 10.255.11.0/30 
            neighbor 10.255.3.2 activate
            ! Lien spine1 <-> spine2 
            network 10.255.3.0/30 
      !
      end
      conf t
      configure
      sflow source-interface Loopback0
      sflow vrf default destination 10.255.9.2 6343
      sflow sample 1000
      sflow run
      write mem
  spine2:
    loopback:
      ipv4: 10.255.0.2/32
    config.inline: |
      enable
      conf t

      interface Loopback0
        ip address 10.255.0.2/32
        
      router bgp 65899
        neighbor 10.0.0.1 remote-as 65899
        neighbor 10.0.0.1 update-source Loopback0
        neighbor 10.0.0.1 description leaf1-evpn
        neighbor 10.0.0.1 route-reflector-client
        neighbor 10.0.0.1 send-community extended
        neighbor 10.0.0.2 remote-as 65899
        neighbor 10.0.0.2 update-source Loopback0
        neighbor 10.0.0.2 description leaf2-evpn
        neighbor 10.0.0.2 route-reflector-client
        neighbor 10.0.0.2 send-community extended
        neighbor 10.0.0.3 remote-as 65899
        neighbor 10.0.0.3 update-source Loopback0
        neighbor 10.0.0.3 description leaf3-evpn
        neighbor 10.0.0.3 route-reflector-client
        neighbor 10.0.0.3 send-community extended
        neighbor 10.0.0.4 remote-as 65899
        neighbor 10.0.0.4 update-source Loopback0
        neighbor 10.0.0.4 description leaf4-evpn
        neighbor 10.0.0.4 route-reflector-client
        neighbor 10.0.0.4 send-community extended
        neighbor 10.255.2.2 remote-as 65899
        neighbor 10.255.2.2 description underlay spine2 -> leaf1
        neighbor 10.255.2.2 route-reflector-client
        neighbor 10.255.2.6 remote-as 65899
        neighbor 10.255.2.6 description underlay spine2 -> leaf2
        neighbor 10.255.2.6 route-reflector-client
        neighbor 10.255.2.10 remote-as 65899
        neighbor 10.255.2.10 description underlay spine2 -> leaf3
        neighbor 10.255.2.10 route-reflector-client
        neighbor 10.255.2.14 remote-as 65899
        neighbor 10.255.2.14 description underlay spine2 -> leaf4
        neighbor 10.255.2.14 route-reflector-client
        neighbor 10.255.3.1 remote-as 65899
        neighbor 10.255.3.1 description peering spine2 -> spine1 
        !
        address-family evpn
            neighbor 10.0.0.1 activate
            neighbor 10.0.0.2 activate
            neighbor 10.0.0.3 activate
            neighbor 10.0.0.4 activate
        !
        address-family ipv4
            neighbor 10.255.2.2 activate
            neighbor 10.255.2.2 next-hop-self
            neighbor 10.255.2.6 activate
            neighbor 10.255.2.6 next-hop-self
            neighbor 10.255.2.10 activate
            neighbor 10.255.2.10 next-hop-self
            neighbor 10.255.2.14 activate
            neighbor 10.255.2.14 next-hop-self
            network 10.255.0.2/32
            neighbor 10.255.3.1 activate 
            ! Lien spine2 <-> spine1
            network 10.255.3.0/30 
      !
      end
      conf t
      configure
      sflow source-interface Loopback0
      sflow vrf default destination 10.255.9.2 6343
      sflow sample 1000
      sflow run
      write mem
  leaf1:
    loopback:
      ipv4: 10.0.0.1/32
    config.inline: |
      enable
      conf t

      vlan 560
        name web
      
      vlan 570
        name machines
        
      interface Ethernet3
        switchport access vlan 560
        
      interface Loopback0
        ip address 10.0.0.1/32

      ip virtual-router mac-address 00:1c:73:00:00:99
      
      interface Vlan560
        ip address virtual 172.16.1.254/24

      interface Vlan570
        ip address virtual 172.16.2.254/24
        
      interface Vxlan1
        vxlan source-interface Loopback0
        vxlan udp-port 4789
        vxlan vlan 560 vni 560100
        vxlan vlan 570 vni 570100
        
      router bgp 65899
        neighbor 10.255.0.1 remote-as 65899
        neighbor 10.255.0.1 update-source Loopback0
        neighbor 10.255.0.1 description overlay leaf1 -> spine1
        neighbor 10.255.0.1 send-community extended
        neighbor 10.255.0.2 remote-as 65899
        neighbor 10.255.0.2 update-source Loopback0
        neighbor 10.255.0.2 description overlay leaf1 -> spine2
        neighbor 10.255.0.2 send-community extended
        neighbor 10.255.1.1 remote-as 65899
        neighbor 10.255.1.1 description underlay leaf1 -> spine1
        neighbor 10.255.2.1 remote-as 65899
        neighbor 10.255.2.1 description underlay leaf1 -> spine2
        !
        vlan 560
            rd 10.0.0.1:560
            route-target both 65899:560
            redistribute learned
        !
        vlan 570
            rd 10.0.0.1:570
            route-target both 65899:570
            redistribute learned
        !
        address-family evpn
            neighbor 10.255.0.1 activate
            neighbor 10.255.0.2 activate
            maximum-paths 2 ecmp 2
        !
        address-family ipv4
            neighbor 10.255.1.1 activate
            neighbor 10.255.2.1 activate
            network 10.0.0.1/32
            redistribute connected
            maximum-paths 2 ecmp 2
      end
      conf t
      configure
      sflow source-interface Loopback0
      sflow vrf default destination 10.255.9.2 6343
      sflow sample 1000
      sflow run
      write mem
  leaf2:
    loopback:
      ipv4: 10.0.0.2/32
    config.inline: |
      enable
      conf t
      vlan 560
        name web
      
      vlan 570
        name machines
        
      interface Ethernet3
        switchport access vlan 560
        
      interface Loopback0
        ip address 10.0.0.2/32

      ip virtual-router mac-address 00:1c:73:00:00:99

      interface Vlan560
        ip address virtual 172.16.1.254/24

      interface Vlan570
        ip address virtual 172.16.2.254/24
        
      interface Vxlan1
        vxlan source-interface Loopback0
        vxlan udp-port 4789
        vxlan vlan 560 vni 560100
        vxlan vlan 570 vni 570100
        
      router bgp 65899
        neighbor 10.255.0.1 remote-as 65899
        neighbor 10.255.0.1 update-source Loopback0
        neighbor 10.255.0.1 description overlay leaf2 -> spine1
        neighbor 10.255.0.1 send-community extended
        neighbor 10.255.0.2 remote-as 65899
        neighbor 10.255.0.2 update-source Loopback0
        neighbor 10.255.0.2 description overlay leaf2 -> spine2
        neighbor 10.255.0.2 send-community extended
        neighbor 10.255.1.5 remote-as 65899
        neighbor 10.255.1.5 description underlay leaf2 -> spine1
        neighbor 10.255.2.5 remote-as 65899
        neighbor 10.255.2.5 description underlay leaf2 -> spine2
        !
        vlan 560
            rd 10.0.0.2:560
            route-target both 65899:560
            redistribute learned
        !
        vlan 570
            rd 10.0.0.2:570
            route-target both 65899:570
            redistribute learned
        !
        address-family evpn
            neighbor 10.255.0.1 activate
            neighbor 10.255.0.2 activate
            maximum-paths 2 ecmp 2
        !
        address-family ipv4
            neighbor 10.255.1.5 activate
            neighbor 10.255.2.5 activate
            network 10.0.0.2/32
            redistribute connected
            maximum-paths 2 ecmp 2
            exit
      !
      end
      conf t
      configure
      sflow source-interface Loopback0
      sflow vrf default destination 10.255.9.2 6343
      sflow sample 1000
      sflow run
      write mem

  leaf3:
    loopback:
      ipv4: 10.0.0.3/32
    config.inline: |
      enable
      conf t

      vlan 560
        name web

      vlan 570
        name machines
        
      interface Ethernet3
        switchport access vlan 570
        
      interface Loopback0
        ip address 10.0.0.3/32

      ip virtual-router mac-address 00:1c:73:00:00:99

      interface Vlan560
        ip address virtual 172.16.1.254/24

      interface Vlan570
        ip address virtual 172.16.2.254/24
        
      interface Vxlan1
        vxlan source-interface Loopback0
        vxlan udp-port 4789
        vxlan vlan 570 vni 570100
        vxlan vlan 560 vni 560100
        
      router bgp 65899
        neighbor 10.255.0.1 remote-as 65899
        neighbor 10.255.0.1 update-source Loopback0
        neighbor 10.255.0.1 description overlay leaf3 -> spine1
        neighbor 10.255.0.1 send-community extended
        neighbor 10.255.0.2 remote-as 65899
        neighbor 10.255.0.2 update-source Loopback0
        neighbor 10.255.0.2 description overlay leaf3 -> spine2
        neighbor 10.255.0.2 send-community extended

        neighbor 10.255.1.9 remote-as 65899
        neighbor 10.255.1.9 description underlay leaf3 -> spine1
        neighbor 10.255.2.9 remote-as 65899
        neighbor 10.255.2.9 description underlay leaf3 -> spine2
        !
        vlan 560
            rd 10.0.0.3:560
            route-target both 65899:560
            redistribute learned
        vlan 570
            rd 10.0.0.3:570
            route-target both 65899:570
            redistribute learned
        !
        address-family evpn
            neighbor 10.255.0.1 activate
            neighbor 10.255.0.2 activate
            maximum-paths 2 ecmp 2
        !
        address-family ipv4
            neighbor 10.255.1.9 activate
            neighbor 10.255.2.9 activate
            network 10.0.0.3/32
            redistribute connected
            maximum-paths 2 ecmp 2
            exit
      !
      end
      conf t
      configure
      sflow source-interface Loopback0
      sflow vrf default destination 10.255.9.2 6343
      sflow sample 1000
      sflow run
      write mem

  bleaf:
    loopback:
      ipv4: 10.0.0.4/32
    config.inline: |
      enable
      configure terminal

      interface Ethernet3
        description border-leaf -> salle (externe)

      ip route 0.0.0.0/0 10.202.255.254

      vlan 560
        name web

      vlan 570
        name machines

      interface Vxlan1
        vxlan udp-port 4789
        vxlan source-interface loopback0
        vxlan vlan 560 vni 560100
        vxlan vlan 570 vni 570100

      router bgp 65899
        maximum-paths 2 ecmp 2
        neighbor 10.255.0.1 remote-as 65899
        neighbor 10.255.0.1 next-hop-self
        neighbor 10.255.0.1 update-source Loopback0
        neighbor 10.255.0.1 description overlay bleaf -> spine1
        neighbor 10.255.0.1 send-community extended
        neighbor 10.255.0.2 remote-as 65899
        neighbor 10.255.0.2 next-hop-self
        neighbor 10.255.0.2 update-source Loopback0
        neighbor 10.255.0.2 description overlay bleaf -> spine2
        neighbor 10.255.0.2 send-community extended
        neighbor 10.255.1.13 remote-as 65899
        neighbor 10.255.1.13 description underlay bleaf -> spine1
        neighbor 10.255.2.13 remote-as 65899
        neighbor 10.255.2.13 description underlay bleaf -> spine2
        neighbor 10.202.8.253 remote-as 65080
        neighbor 10.202.8.253 ebgp-multihop 3
        neighbor 10.202.8.253 send-community extended
        neighbor 10.202.8.253 description underlay bleaf -> Pierre
        neighbor 10.202.1.12 remote-as 65001
        neighbor 10.202.1.12 ebgp-multihop 3
        neighbor 10.202.1.12 send-community extended
        neighbor 10.202.1.12 description underlay bleaf -> Soyfoudine
        vlan 560
          rd 10.0.0.4:560
          route-target both 65899:560
          route-target both 65080:560
          route-target both 65001:560
          redistribute learned
        vlan 570
          rd 10.0.0.4:570
          route-target both 65899:570
          route-target both 65080:570
          route-target both 65001:570
          redistribute learned
        address-family evpn
          neighbor 10.202.1.12 activate
          neighbor 10.202.8.253 activate
          neighbor 10.255.0.1 activate
          neighbor 10.255.0.2 activate
          maximum-paths 2 ecmp 2
        address-family ipv4
          neighbor 10.202.1.12 activate
          neighbor 10.202.8.253 activate
          neighbor 10.255.1.13 activate
          neighbor 10.255.1.13 next-hop-self
          neighbor 10.255.2.13 activate
          neighbor 10.255.2.13 next-hop-self
          network 10.0.0.4/32
          redistribute static
          maximum-paths 2 ecmp 2
      end
      conf t
      sflow source-interface Loopback0
      sflow vrf default destination 10.255.9.2 6343
      sflow sample 1000
      sflow run
      write memory

  grafana:
    device: linux
    image: grafana/grafana:12.2.9
    clab:
      ports:
        - "0.0.0.0:3000:3000"
  prometheus:
    device: linux
    image: prometheus-sae:latest
    clab:
      ports:
        - "0.0.0.0:9090:9090"
  sflowrt:
    device: linux
    image: sflowrt-sae:latest
    clab:
      ports:
        - "0.0.0.0:8008:8008"
  nginx1:
    device: linux
    image: nginx:latest
    clab:
      ports:
        - "80:80"
    module: [ routing ]
    routing.static:
      - ipv4: 0.0.0.0/0
        nexthop.ipv4: 172.16.1.254

  nginx2:
    device: linux
    image: nginx:latest
    clab:
      ports:
        - "81:81"
    module: [ routing ]
    routing.static:
      - ipv4: 0.0.0.0/0
        nexthop.ipv4: 172.16.1.254

  librespeed:
    device: linux
    image: linuxserver/librespeed
    clab:
      ports:
        - "0.0.0.0:8080:8080"
    module: [ routing ]
    routing.static:
      - ipv4: 0.0.0.0/0
        nexthop.ipv4: 172.16.1.254

  remotedesktop:
    device: linux
    image: linuxserver/webtop:ubuntu-kde-version-f0194e9c
    clab:
      ports:
        - "3389:3389"
    module: [ routing ]
    routing.static:
      - ipv4: 0.0.0.0/0
        nexthop.ipv4: 172.16.1.254

  networkutils:
    device: linux
    image: amouat/network-utils
    module: [ routing ]
    routing.static:
      - ipv4: 0.0.0.0/0
        nexthop.ipv4: 172.16.2.254

