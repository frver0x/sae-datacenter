  </defs>

  <rect x="0" y="0" width="1240" height="900" fill="#ffffff"/>
  <text x="620" y="38" text-anchor="middle" font-size="24" font-weight="bold" fill="#111">SAE4D01 — Architecture complète du lab datacenter</text>

  <!-- ACCES -->
  <rect x="40" y="60" width="360" height="90" rx="10" fill="#eef2f7" stroke="#9aa7b4" stroke-width="1.5"/>
