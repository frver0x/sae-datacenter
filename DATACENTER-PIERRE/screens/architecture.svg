  <text x="135" y="129" text-anchor="middle" font-size="11" fill="#555">Tailscale · VS Code SSH</text>
  <rect x="230" y="95" width="150" height="44" rx="8" fill="#fff" stroke="#a11d20" stroke-width="1.5"/>
