  <text x="490" y="720" text-anchor="middle" font-size="11" fill="#ffe6d5">:9090</text>
  <text x="490" y="738" text-anchor="middle" font-size="10" fill="#ffe6d5">scrape 2s · stockage</text>

  <rect x="650" y="660" width="180" height="96" rx="8" fill="#f23f42" stroke="#a11d20"/>
  <text x="740" y="700" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Grafana</text>
  <text x="740" y="720" text-anchor="middle" font-size="11" fill="#ffe1e1">:3000</text>
  <text x="740" y="738" text-anchor="middle" font-size="10" fill="#ffe1e1">dashboard (PromQL)</text>

