  <rect x="900" y="230" width="280" height="120" rx="10" fill="#eceff1" stroke="#90a4ae" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="1040" y="256" text-anchor="middle" font-size="14" font-weight="bold" fill="#607d8b">VM220 — leaf-spine-lab1</text>
  <text x="1040" y="276" text-anchor="middle" font-size="12" fill="#607d8b">10.202.8.220</text>
  <text x="1040" y="300" text-anchor="middle" font-size="13" font-weight="bold" fill="#455a64">PRODUCTION</text>
  <text x="1040" y="318" text-anchor="middle" font-size="11" fill="#78909c">(réservée — lab migré ailleurs)</text>

