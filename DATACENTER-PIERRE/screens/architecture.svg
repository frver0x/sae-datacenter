  <rect x="40" y="180" width="1160" height="690" rx="14" fill="#f6f8fa" stroke="#57606a" stroke-width="2"/>
  <text x="62" y="208" font-size="16" font-weight="bold" fill="#33425a">Hyperviseur Proxmox — pvepierre · 10.202.8.101</text>

