  <text x="918" y="404" font-size="13" font-weight="bold" fill="#33425a">Légende</text>
  <rect x="918" y="416" width="20" height="14" rx="3" fill="#1f6feb"/><text x="946" y="428" font-size="12" fill="#111">spine (coeur)</text>
  <rect x="918" y="438" width="20" height="14" rx="3" fill="#2ea043"/><text x="946" y="450" font-size="12" fill="#111">leaf (accès)</text>
  <rect x="918" y="460" width="20" height="14" rx="7" fill="#d29922"/><text x="946" y="472" font-size="12" fill="#111">host (iperf3)</text>
  <rect x="918" y="482" width="20" height="14" rx="3" fill="#8957e5"/><text x="946" y="494" font-size="12" fill="#111">exporter maison</text>
  <line x1="918" y1="512" x2="940" y2="512" stroke="#8957e5" stroke-width="2.5" stroke-dasharray="6 4"/><text x="946" y="516" font-size="12" fill="#111">flux métriques</text>
  <line x1="918" y1="534" x2="940" y2="534" stroke="#2ea043" stroke-width="2.5"/><text x="946" y="538" font-size="12" fill="#111">liens underlay /31</text>
