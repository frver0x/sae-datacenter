  <line x1="490" y1="132" x2="600" y2="230" stroke="#a11d20" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 305 139 C 350 160, 410 160, 460 95" fill="none" stroke="#a11d20" stroke-width="1.8" marker-end="url(#arr)"/>
  <!-- NAT to grafana (route along right gap, hors fabric) -->
  <path d="M 540 105 C 888 120, 888 560, 832 700" fill="none" stroke="#a11d20" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <text x="892" y="600" font-size="11" fill="#a11d20" font-weight="bold" transform="rotate(90 892 600)">NAT → Grafana :3000</text>

  <!-- legend -->
