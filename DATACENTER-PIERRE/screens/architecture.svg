  <text x="220" y="746" text-anchor="middle" font-size="10" fill="#ece3ff">+ lecture JSON benchmark</text>

  <rect x="400" y="660" width="180" height="96" rx="8" fill="#e85d04" stroke="#9d3a00"/>
