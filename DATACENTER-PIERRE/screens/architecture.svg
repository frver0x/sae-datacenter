  <text x="100" y="628" font-size="13" font-weight="bold" fill="#5a32a3">OBSERVABILITÉ — docker compose</text>

  <rect x="120" y="648" width="200" height="120" rx="8" fill="#8957e5" stroke="#5a32a3"/>
  <text x="220" y="690" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">clab_exporter.py</text>
  <text x="220" y="710" text-anchor="middle" font-size="11" fill="#ece3ff">:9101 (maison)</text>
