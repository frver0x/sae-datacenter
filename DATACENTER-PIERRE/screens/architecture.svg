    <line x1="360" y1="360" x2="460" y2="420"/>
    <line x1="360" y1="360" x2="690" y2="420"/>
    <line x1="560" y1="360" x2="230" y2="420"/>
    <line x1="560" y1="360" x2="460" y2="420"/>
    <line x1="560" y1="360" x2="690" y2="420"/>
  </g>
  <g stroke="#9a6a00" stroke-width="2.5" opacity="0.8">
    <line x1="230" y1="468" x2="230" y2="525"/>
    <line x1="460" y1="468" x2="460" y2="525"/>
    <line x1="690" y1="468" x2="690" y2="525"/>
