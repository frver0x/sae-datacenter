frr version 10.6.1
frr defaults traditional
hostname leaf3
log syslog informational
no ipv6 forwarding
!
interface lo
 ip address 10.255.0.13/32
!
interface eth1
 ip address 10.0.1.5/31
 description to-spine1-rr
!
interface eth2
 ip address 10.0.1.11/31
 description to-spine2-rr
!
interface eth3
 ip address 192.168.3.1/24
 description to-host3
!
router bgp 65080
 bgp router-id 10.255.0.13
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 neighbor 10.0.1.4 remote-as 65080
 neighbor 10.0.1.4 description spine1-rr
 neighbor 10.0.1.10 remote-as 65080
 neighbor 10.0.1.10 description spine2-rr
 !
 address-family ipv4 unicast
  network 10.255.0.13/32
  network 192.168.3.0/24
  neighbor 10.0.1.4 activate
  neighbor 10.0.1.10 activate
 exit-address-family
!
