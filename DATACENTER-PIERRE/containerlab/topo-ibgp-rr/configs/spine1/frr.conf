frr version 10.6.1
frr defaults traditional
hostname spine1
log syslog informational
no ipv6 forwarding
!
interface lo
 ip address 10.255.0.1/32
!
interface eth1
 ip address 10.0.1.0/31
 description to-leaf1
!
interface eth2
 ip address 10.0.1.2/31
 description to-leaf2
!
interface eth3
 ip address 10.0.1.4/31
 description to-leaf3
!
router bgp 65080
 bgp router-id 10.255.0.1
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 neighbor 10.0.1.1 remote-as 65080
 neighbor 10.0.1.1 description leaf1
 neighbor 10.0.1.1 route-reflector-client
 neighbor 10.0.1.1 next-hop-self force
 neighbor 10.0.1.3 remote-as 65080
 neighbor 10.0.1.3 description leaf2
 neighbor 10.0.1.3 route-reflector-client
 neighbor 10.0.1.3 next-hop-self force
 neighbor 10.0.1.5 remote-as 65080
 neighbor 10.0.1.5 description leaf3
 neighbor 10.0.1.5 route-reflector-client
 neighbor 10.0.1.5 next-hop-self force
 !
 address-family ipv4 unicast
  network 10.255.0.1/32
  neighbor 10.0.1.1 activate
  neighbor 10.0.1.3 activate
  neighbor 10.0.1.5 activate
 exit-address-family
!
