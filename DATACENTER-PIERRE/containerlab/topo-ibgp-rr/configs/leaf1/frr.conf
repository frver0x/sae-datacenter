frr version 10.6.1
frr defaults traditional
hostname leaf1
log syslog informational
no ipv6 forwarding
!
interface lo
 ip address 10.255.0.11/32
!
interface eth1
 ip address 10.0.1.1/31
 description to-spine1-rr
!
interface eth2
 ip address 10.0.1.7/31
 description to-spine2-rr
!
interface eth3
 ip address 192.168.1.1/24
 description to-host1
!
router bgp 65080
 bgp router-id 10.255.0.11
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 neighbor 10.0.1.0 remote-as 65080
 neighbor 10.0.1.0 description spine1-rr
 neighbor 10.0.1.6 remote-as 65080
 neighbor 10.0.1.6 description spine2-rr
 !
 address-family ipv4 unicast
  network 10.255.0.11/32
  network 192.168.1.0/24
  neighbor 10.0.1.0 activate
  neighbor 10.0.1.6 activate
 exit-address-family
!
