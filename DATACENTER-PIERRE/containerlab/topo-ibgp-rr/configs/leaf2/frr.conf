frr version 10.6.1
frr defaults traditional
hostname leaf2
log syslog informational
no ipv6 forwarding
!
interface lo
 ip address 10.255.0.12/32
!
interface eth1
 ip address 10.0.1.3/31
 description to-spine1-rr
!
interface eth2
 ip address 10.0.1.9/31
 description to-spine2-rr
!
interface eth3
 ip address 192.168.2.1/24
 description to-host2
!
router bgp 65080
 bgp router-id 10.255.0.12
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 neighbor 10.0.1.2 remote-as 65080
 neighbor 10.0.1.2 description spine1-rr
 neighbor 10.0.1.8 remote-as 65080
 neighbor 10.0.1.8 description spine2-rr
 !
 address-family ipv4 unicast
  network 10.255.0.12/32
  network 192.168.2.0/24
  neighbor 10.0.1.2 activate
  neighbor 10.0.1.8 activate
 exit-address-family
!
