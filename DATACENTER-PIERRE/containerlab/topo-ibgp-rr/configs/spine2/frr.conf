frr version 10.6.1
frr defaults traditional
hostname spine2
log syslog informational
no ipv6 forwarding
!
interface lo
 ip address 10.255.0.2/32
!
interface eth1
 ip address 10.0.1.6/31
 description to-leaf1
!
interface eth2
 ip address 10.0.1.8/31
 description to-leaf2
!
interface eth3
 ip address 10.0.1.10/31
 description to-leaf3
!
router bgp 65080
 bgp router-id 10.255.0.2
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 neighbor 10.0.1.7 remote-as 65080
 neighbor 10.0.1.7 description leaf1
 neighbor 10.0.1.7 route-reflector-client
 neighbor 10.0.1.7 next-hop-self force
 neighbor 10.0.1.9 remote-as 65080
 neighbor 10.0.1.9 description leaf2
 neighbor 10.0.1.9 route-reflector-client
 neighbor 10.0.1.9 next-hop-self force
 neighbor 10.0.1.11 remote-as 65080
 neighbor 10.0.1.11 description leaf3
 neighbor 10.0.1.11 route-reflector-client
 neighbor 10.0.1.11 next-hop-self force
 !
 address-family ipv4 unicast
  network 10.255.0.2/32
  neighbor 10.0.1.7 activate
  neighbor 10.0.1.9 activate
  neighbor 10.0.1.11 activate
 exit-address-family
!
