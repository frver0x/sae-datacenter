frr version 10.6.1_git
frr defaults traditional
hostname leaf3
log syslog informational
no ipv6 forwarding
!
interface eth1
 description to-spine1
 ip address 10.0.1.5/31
exit
!
interface eth2
 description to-spine2
 ip address 10.0.1.11/31
exit
!
interface eth3
 description to-host3
 ip address 192.168.82.1/24
exit
!
interface lo
 ip address 10.255.0.13/32
exit
!
router bgp 65085
 bgp router-id 10.255.0.13
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 neighbor 10.0.1.4 remote-as 65081
 neighbor 10.0.1.4 description spine1
 neighbor 10.0.1.4 bfd
 neighbor 10.0.1.10 remote-as 65082
 neighbor 10.0.1.10 description spine2
 neighbor 10.0.1.10 bfd
 !
 address-family ipv4 unicast
  network 10.255.0.13/32
  network 192.168.82.0/24
  neighbor 10.0.1.4 activate
  neighbor 10.0.1.10 activate
 exit-address-family
exit
!
