frr version 10.6.1_git
frr defaults traditional
hostname leaf4
log syslog informational
no ipv6 forwarding
!
interface eth1
 description to-spine1
 ip address 10.0.1.17/31
exit
!
interface eth2
 description to-spine2
 ip address 10.0.1.19/31
exit
!
interface lo
 ip address 10.255.0.14/32
exit
!
router bgp 65086
 bgp router-id 10.255.0.14
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 neighbor 10.0.1.16 remote-as 65081
 neighbor 10.0.1.16 description spine1
 neighbor 10.0.1.16 bfd
 neighbor 10.0.1.18 remote-as 65082
 neighbor 10.0.1.18 description spine2
 neighbor 10.0.1.18 bfd
 !
 address-family ipv4 unicast
  network 10.255.0.14/32
  neighbor 10.0.1.16 activate
  neighbor 10.0.1.18 activate
 exit-address-family
exit
!
