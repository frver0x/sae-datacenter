frr version 10.6.1_git
frr defaults traditional
hostname leaf2
log syslog informational
no ipv6 forwarding
!
interface eth1
 description to-spine1
 ip address 10.0.1.3/31
exit
!
interface eth2
 description to-spine2
 ip address 10.0.1.9/31
exit
!
interface eth3
 description to-host2
 ip address 192.168.81.1/24
exit
!
interface lo
 ip address 10.255.0.12/32
exit
!
router bgp 65084
 bgp router-id 10.255.0.12
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 neighbor 10.0.1.2 remote-as 65081
 neighbor 10.0.1.2 description spine1
 neighbor 10.0.1.2 bfd
 neighbor 10.0.1.8 remote-as 65082
 neighbor 10.0.1.8 description spine2
 neighbor 10.0.1.8 bfd
 neighbor 10.202.8.205 remote-as 65899
 neighbor 10.202.8.205 ebgp-multihop 5
 neighbor 10.202.8.205 update-source lo
 !
 address-family ipv4 unicast
  network 10.255.0.12/32
  network 192.168.81.0/24
  neighbor 10.0.1.2 activate
  neighbor 10.0.1.8 activate
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor 10.202.8.205 activate
  vni 560100
  exit-vni
 exit-address-family
exit
!
