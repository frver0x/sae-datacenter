name: topo-evpn

topology:
  nodes:
    spine1:
      kind: linux
      image: quay.io/frrouting/frr:10.6.1
      binds:
        - configs/spine1/frr.conf:/etc/frr/frr.conf
        - configs/spine1/daemons:/etc/frr/daemons
      exec:
        - sysctl -w net.ipv4.ip_forward=1
        - sysctl -w net.ipv6.conf.all.forwarding=1

    spine2:
      kind: linux
      image: quay.io/frrouting/frr:10.6.1
      binds:
        - configs/spine2/frr.conf:/etc/frr/frr.conf
        - configs/spine2/daemons:/etc/frr/daemons
      exec:
        - sysctl -w net.ipv4.ip_forward=1
        - sysctl -w net.ipv6.conf.all.forwarding=1

    leaf1:
      kind: linux
      image: quay.io/frrouting/frr:10.6.1
      binds:
        - configs/leaf1/frr.conf:/etc/frr/frr.conf
        - configs/leaf1/daemons:/etc/frr/daemons
      exec:
        - sysctl -w net.ipv4.ip_forward=1
        - sysctl -w net.ipv6.conf.all.forwarding=1
        - ip addr add 10.255.0.11/32 dev lo 2>/dev/null || true
        - ip link add vxlan100 type vxlan id 100 local 10.255.0.11 dstport 4789 nolearning
        - ip link add br100 type bridge
        - ip link set vxlan100 master br100
        - ip link set eth3 master br100
        - ip link set vxlan100 up
        - ip link set br100 up
        - ip link set eth3 up

    leaf2:
      kind: linux
      image: quay.io/frrouting/frr:10.6.1
      binds:
        - configs/leaf2/frr.conf:/etc/frr/frr.conf
        - configs/leaf2/daemons:/etc/frr/daemons
      exec:
        - sysctl -w net.ipv4.ip_forward=1
        - sysctl -w net.ipv6.conf.all.forwarding=1
        - ip addr add 10.255.0.12/32 dev lo 2>/dev/null || true
        - ip link add vxlan100 type vxlan id 100 local 10.255.0.12 dstport 4789 nolearning
        - ip link add br100 type bridge
        - ip link set vxlan100 master br100
        - ip link set eth3 master br100
        - ip link set vxlan100 up
        - ip link set br100 up
        - ip link set eth3 up

    leaf3:
      kind: linux
      image: quay.io/frrouting/frr:10.6.1
      binds:
        - configs/leaf3/frr.conf:/etc/frr/frr.conf
        - configs/leaf3/daemons:/etc/frr/daemons
      exec:
        - sysctl -w net.ipv4.ip_forward=1
        - sysctl -w net.ipv6.conf.all.forwarding=1
        - ip addr add 10.255.0.13/32 dev lo 2>/dev/null || true
        - ip link add vxlan100 type vxlan id 100 local 10.255.0.13 dstport 4789 nolearning
        - ip link add br100 type bridge
        - ip link set vxlan100 master br100
        - ip link set eth3 master br100
        - ip link set vxlan100 up
        - ip link set br100 up
        - ip link set eth3 up

    host1:
      kind: linux
      image: alpine:latest
      exec:
        - apk add --no-cache iperf3
        - ip addr add 10.10.10.2/24 dev eth1
        - ip link set eth1 up

    host2:
      kind: linux
      image: alpine:latest
      exec:
        - apk add --no-cache iperf3
        - ip addr add 10.10.10.3/24 dev eth1
        - ip link set eth1 up

    host3:
      kind: linux
      image: alpine:latest
      exec:
        - apk add --no-cache iperf3
        - ip addr add 10.10.10.4/24 dev eth1
        - ip link set eth1 up

  links:
    - endpoints: [spine1:eth1, leaf1:eth1]
    - endpoints: [spine1:eth2, leaf2:eth1]
    - endpoints: [spine1:eth3, leaf3:eth1]
    - endpoints: [spine2:eth1, leaf1:eth2]
    - endpoints: [spine2:eth2, leaf2:eth2]
    - endpoints: [spine2:eth3, leaf3:eth2]
    - endpoints: [leaf1:eth3, host1:eth1]
    - endpoints: [leaf2:eth3, host2:eth1]
    - endpoints: [leaf3:eth3, host3:eth1]
